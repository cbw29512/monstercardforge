name: Static safety

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run safety tests
        shell: bash
        run: |
          set +e
          npm test > static-safety.log 2>&1
          status=$?
          tail -n 140 static-safety.log
          exit "$status"
