name: Production readiness

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-readiness-${{ github.ref }}
  cancel-in-progress: true

jobs:
  browser-gate:
    name: Static, workflow, mobile, and accessibility gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install test dependencies
        run: npm install --no-audit --no-fund

      - name: Run static safety and rules tests
        shell: bash
        run: |
          set +e
          npm run test:static 2>&1 | tee static-test-output.txt
          status=${PIPESTATUS[0]}
          exit "$status"

      - name: Install Chromium and WebKit
        run: npx playwright install --with-deps chromium webkit

      - name: Run production browser gate
        run: npm run test:browser

      - name: Preserve production-readiness evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dm-forge-production-readiness-${{ github.run_id }}
          path: |
            static-test-output.txt
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 14
