name: Bug Report
description: Report a reproducible problem, broken workflow, data loss risk, or display failure.
title: "[Bug]: "
body:
  - type: markdown
    attributes:
      value: |
        Thank you for helping make DM Forge reliable. Please do not include private campaign secrets, player information, room histories, or security exploit details in a public issue.
  - type: dropdown
    id: tool
    attributes:
      label: Affected tool
      options:
        - DM Forge homepage
        - Campaign Hub
        - Campaign Search
        - Session Console
        - Encounter Forge
        - Player Display
        - Monster Card Forge
        - Magic Item Forge
        - NPC Forge
        - Loot Forge
        - Backup & Storage Center
        - Cleric in a Box
        - Cross-tool handoff
        - Other
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the visible failure and what you expected instead.
      placeholder: I clicked... The page showed... I expected...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Give the smallest repeatable sequence.
      placeholder: |
        1. Open...
        2. Create or select...
        3. Click...
        4. Observe...
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser and version
      placeholder: Chrome 150, Edge 150, Safari 19, Firefox 142
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device and operating system
      placeholder: Windows 11 laptop, Android phone, iPadOS tablet
    validations:
      required: true
  - type: dropdown
    id: storage
    attributes:
      label: Did this affect saved data?
      options:
        - No
        - Data looked wrong but remained recoverable
        - Data disappeared or was overwritten
        - Unsure
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Screenshots, console errors, or additional context
      description: Remove private campaign and player information before attaching anything.
    validations:
      required: false
  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmations
      options:
        - label: I searched existing issues and discussions for this problem.
          required: true
        - label: I removed private campaign, player, and room information.
          required: true
        - label: I agree to follow the DM Forge Code of Conduct.
          required: true
