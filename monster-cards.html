<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Monster Card Forge | DM Forge</title>
  <link rel="stylesheet" href="src/styles/main.css">
  <link rel="stylesheet" href="src/styles/ui-overhaul.css">
  <link rel="stylesheet" href="src/styles/print-layouts.css">
  <style>
    .dmforge-return{display:inline-flex;align-items:center;gap:.45rem;margin-bottom:.65rem;color:inherit;text-decoration:none;font-weight:800}
    .dmforge-return:hover{text-decoration:underline}
    @media print{.dmforge-return{display:none!important}}
  </style>
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <div class="brand-mark">MCF</div>
      <div>
        <a class="dmforge-return" href="index.html">← DM Forge Toolkit</a>
        <h1>Monster Card Forge</h1>
        <p class="tagline">Print-ready monster cards, boss accordion cards, and guided homebrew tools.</p>
      </div>
    </div>
    <nav class="tabs">
      <button class="tab active" data-tab="free">Free Goblin Sample</button>
      <button class="tab" data-tab="library">Browse Cards</button>
      <button class="tab" data-tab="homebrew">Create Homebrew</button>
      <button class="tab" data-tab="legal">Legal / Attribution</button>
    </nav>
  </header>
  <main class="layout">
    <aside id="side" class="side"></aside>
    <section id="stage" class="stage"></section>
  </main>
  <footer class="legal-footer">Monster Card Forge is an independent tabletop utility. Open-license rules content requires attribution and clear ruleset separation.</footer>
  <script type="module" src="src/js/app.js"></script>
</body>
</html>
